<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Cyber Hub — Gaming platform. Játékok, hírek, GOTY, közösség."/>
    <title>Cyber Hub</title>

    <!-- Google Fonts: Orbitron (display) + Rajdhani (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/styles.css"/>

    <!-- React (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX fordítás a böngészőben) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
      /* Critical inline: loading spinner */
      #root:empty::after {
        content: "";
        display: block;
        width: 40px; height: 40px;
        border: 3px solid rgba(55,182,255,.2);
        border-top-color: #37b6ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 40vh auto 0;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="bg-grid">
    <div id="root"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Navbar scroll class -->
    <script>
      window.addEventListener('scroll', function() {
        const nav = document.querySelector('.navbar');
        if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
      }, { passive: true });
    </script>

    <!-- App scripts (sorrend fontos, mert nincs bundler/import) -->
    <script type="text/babel" data-presets="env,react" src="/lib/api.js"></script>
    <script type="text/babel" data-presets="env,react" src="/components/UI.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/components/Layout.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/components/HomeWidgets.jsx"></script>

    <script type="text/babel" data-presets="env,react" src="/pages/Home.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/pages/Games.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/pages/GOTY.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/pages/Wall.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/pages/Support.jsx"></script>

    <script type="text/babel" data-presets="env,react" src="/App.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="/main.jsx"></script>
  </body>
</html>
